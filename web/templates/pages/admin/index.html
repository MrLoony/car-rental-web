{{define "content"}}
<section class="py-4 sm:py-8">
    <div class="max-w-2xl">
        <p class="mb-3 text-sm font-semibold uppercase tracking-wide text-teal-700">Admin</p>
        <h1 class="text-4xl font-semibold tracking-tight text-slate-950 sm:text-5xl">Admin dashboard</h1>
        <p class="mt-5 text-lg leading-8 text-slate-600">
            Review rental operations and manage incoming booking requests.
        </p>
    </div>
</section>

<section class="grid gap-5 md:grid-cols-2">
    <a class="block rounded-xl border border-slate-200 bg-white p-6 shadow-sm transition hover:border-teal-700 hover:shadow-md" href="/admin/bookings">
        <p class="text-sm font-semibold uppercase tracking-wide text-teal-700">Bookings</p>
        <h2 class="mt-3 text-2xl font-semibold tracking-tight text-slate-950">Booking requests</h2>
        <p class="mt-3 text-sm leading-6 text-slate-600">
            View submitted booking requests and update their status.
        </p>
    </a>

    <div class="rounded-xl border border-dashed border-slate-300 bg-white p-6">
        <p class="text-sm font-semibold uppercase tracking-wide text-slate-500">Security</p>
        <h2 class="mt-3 text-2xl font-semibold tracking-tight text-slate-950">Authentication planned</h2>
        <p class="mt-3 text-sm leading-6 text-slate-600">
            Admin authentication will be added in a later stage.
        </p>
    </div>
</section>
{{end}}
