{{define "content"}}
<section class="mx-auto max-w-2xl rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-6 text-center shadow-sm sm:p-8">
    <p class="text-sm font-semibold uppercase tracking-wide text-red-700 dark:text-red-300">Server error</p>
    <h1 class="mt-3 text-3xl font-semibold tracking-tight text-slate-950 dark:text-slate-100">Something went wrong</h1>
    <p class="mt-4 text-base leading-7 text-slate-600 dark:text-slate-300">
        We could not process your request. Please try again later.
    </p>

    <div class="mt-8 flex flex-col justify-center gap-3 sm:flex-row">
        <a class="btn btn-primary" href="/">
            Back to Home
        </a>
        <a class="btn btn-secondary" href="/cars">
            Browse Cars
        </a>
    </div>
</section>
{{end}}
