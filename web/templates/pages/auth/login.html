{{define "content"}}
<section class="mx-auto max-w-md rounded-2xl border border-slate-200 bg-white p-6 shadow-sm sm:p-8">
    <div class="text-center">
        <p class="text-sm font-semibold uppercase tracking-wide text-sky-700">Admin</p>
        <h1 class="mt-3 text-3xl font-semibold tracking-tight text-slate-950">Login</h1>
        <p class="mt-3 text-sm leading-6 text-slate-600">
            Sign in to manage booking requests.
        </p>
    </div>

    <form class="mt-8 space-y-5" method="POST" action="/login">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

        {{if not .Flash}}
            {{with index .LoginForm.Errors "credentials"}}
            <p class="rounded-md bg-red-50 px-3 py-2 text-sm font-medium text-red-700" role="alert">{{.}}</p>
            {{end}}
        {{end}}

        <div>
            <label class="form-label" for="email">Email</label>
            <input class="form-input mt-2" id="email" name="email" type="email" value="{{.LoginForm.Email}}" autocomplete="email">
            {{with index .LoginForm.Errors "email"}}
            <p class="form-error" role="alert">{{.}}</p>
            {{end}}
        </div>

        <div>
            <label class="form-label" for="password">Password</label>
            <input class="form-input mt-2" id="password" name="password" type="password" autocomplete="current-password">
            {{with index .LoginForm.Errors "password"}}
            <p class="form-error" role="alert">{{.}}</p>
            {{end}}
        </div>

        <button class="btn btn-primary w-full" type="submit">
            Login
        </button>
    </form>
</section>
{{end}}
