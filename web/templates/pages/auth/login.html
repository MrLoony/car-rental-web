{{define "content"}}
<section class="mx-auto max-w-md rounded-xl border border-slate-200 bg-white p-8 shadow-sm">
    <div class="text-center">
        <p class="text-sm font-semibold uppercase tracking-wide text-teal-700">Admin</p>
        <h1 class="mt-3 text-3xl font-semibold tracking-tight text-slate-950">Login</h1>
        <p class="mt-3 text-sm leading-6 text-slate-600">
            Sign in to manage booking requests.
        </p>
    </div>

    <form class="mt-8 space-y-5" method="POST" action="/login">
        {{with index .LoginForm.Errors "credentials"}}
        <p class="rounded-md bg-red-50 px-3 py-2 text-sm font-medium text-red-700">{{.}}</p>
        {{end}}

        <div>
            <label class="block text-sm font-medium text-slate-700" for="email">Email</label>
            <input class="mt-2 w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-950 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-teal-700 focus:ring-2 focus:ring-teal-700/20" id="email" name="email" type="email" value="{{.LoginForm.Email}}" autocomplete="email">
            {{with index .LoginForm.Errors "email"}}
            <p class="mt-2 text-sm text-red-600">{{.}}</p>
            {{end}}
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700" for="password">Password</label>
            <input class="mt-2 w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-950 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-teal-700 focus:ring-2 focus:ring-teal-700/20" id="password" name="password" type="password" autocomplete="current-password">
            {{with index .LoginForm.Errors "password"}}
            <p class="mt-2 text-sm text-red-600">{{.}}</p>
            {{end}}
        </div>

        <button class="inline-flex w-full items-center justify-center rounded-md bg-teal-700 px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-teal-800" type="submit">
            Login
        </button>
    </form>
</section>
{{end}}
