{{define "content"}}
<section class="mx-auto max-w-2xl rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-6 text-center shadow-sm sm:p-8">
    <p class="text-sm font-semibold uppercase tracking-wide text-sky-700 dark:text-sky-300">Request sent</p>
    <h1 class="mt-3 text-3xl font-semibold tracking-tight text-slate-950 dark:text-slate-100">Booking request sent</h1>
    <p class="mt-4 text-base leading-7 text-slate-600 dark:text-slate-300">
        Your booking request was received and is currently pending review.
    </p>

    {{if .BookingID}}
    <p class="mt-5 rounded-lg bg-slate-50 dark:bg-slate-800/70 px-4 py-3 text-sm font-medium text-slate-700 dark:text-slate-300">
        Booking request ID: {{.BookingID}}
    </p>
    {{end}}

    <div class="mt-8 flex flex-col justify-center gap-3 sm:flex-row">
        <a class="btn btn-primary" href="/cars">
            Back to catalog
        </a>
        <a class="btn btn-secondary" href="/">
            Home
        </a>
    </div>
</section>
{{end}}
