{{define "content"}}
<section class="mx-auto max-w-2xl rounded-xl border border-slate-200 bg-white p-8 text-center shadow-sm">
    <p class="text-sm font-semibold uppercase tracking-wide text-teal-700">Request sent</p>
    <h1 class="mt-3 text-3xl font-semibold tracking-tight text-slate-950">Booking request sent</h1>
    <p class="mt-4 text-base leading-7 text-slate-600">
        Your booking request was received and is currently pending review.
    </p>

    {{if .BookingID}}
    <p class="mt-5 rounded-lg bg-slate-50 px-4 py-3 text-sm font-medium text-slate-700">
        Booking request ID: {{.BookingID}}
    </p>
    {{end}}

    <div class="mt-8 flex flex-col justify-center gap-3 sm:flex-row">
        <a class="inline-flex items-center justify-center rounded-md bg-teal-700 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-teal-800" href="/cars">
            Back to catalog
        </a>
        <a class="inline-flex items-center justify-center rounded-md border border-slate-300 bg-white px-5 py-2.5 text-sm font-semibold text-slate-800 transition hover:border-slate-400 hover:bg-slate-100" href="/">
            Home
        </a>
    </div>
</section>
{{end}}
